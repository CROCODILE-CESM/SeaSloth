name: Benchmark Dashboard

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: bench
          python-version: "3.11"

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge xesmf numpy xarray
          pip install asv

      - name: Run fast benchmarks (xesmf suite)
        shell: bash -el {0}
        run: |
          PYTHON="$(which python)"
          python -m asv run \
            --python "$PYTHON" \
            --bench "xesmf" \
            --quick

      - name: Build dashboard
        shell: bash -el {0}
        run: python -m asv publish

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .asv/html

  deploy:
    needs: benchmark
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
