name: Data Access Health

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check-and-publish:
    runs-on: ubuntu-latest
    outputs:
      links_ok: ${{ steps.links.outputs.ok }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install asv matplotlib numpy requests

      - name: Run HTTP link checks
        id: links
        run: |
          if python scripts/check_links.py; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::One or more data source links failed — see health page for details."
          fi

      - name: Prune old CI results (keep last 30 days)
        run: |
          find results/github-ci -name 'ci-*-link-check.json' 2>/dev/null \
            | sort | head -n -30 | xargs --no-run-if-empty rm -v || true

      - name: Commit updated CI results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/github-ci/
          git diff --cached --quiet || git commit -m "ci: daily link check $(date -u +%Y-%m-%d)"

      - name: Push CI results
        run: git push

      - name: Build dashboard
        run: asv publish

      - name: Generate benchmark report
        run: python scripts/generate_report.py

      - name: Generate data access health page
        run: python scripts/generate_health_page.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .asv/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Fail if links broken
        if: steps.links.outputs.ok == 'false'
        run: |
          echo "One or more data source links failed."
          exit 1
