name: Publish Report

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 06:00 UTC daily — runs the data-access health check, then rebuilds both pages.
    - cron: "0 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  data-health:
    # Only on the daily cron / manual dispatch — a real network+CrocoDash check,
    # not something to re-run on every push.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/crocodile-cesm/crocontainer:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run data-access health check
        working-directory: ${{ github.workspace }}
        shell: bash
        env:
          CDSAPI_URL: ${{ secrets.CDSAPI_URL }}
          CDSAPI_KEY: ${{ secrets.CDSAPI_KEY }}
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
        run: |
          source /opt/conda/etc/profile.d/conda.sh
          conda activate CrocoDash
          python scripts/check_data_access.py || true

      - name: Commit health snapshot
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add results/health.json
          git diff --cached --quiet || git commit -m "ci: daily data-access health $(date -u +%Y-%m-%d)"
          git push

  publish:
    needs: [data-health]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate benchmark report
        run: python scripts/generate_report.py

      - name: Generate data access health report
        run: python scripts/generate_health_report.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
